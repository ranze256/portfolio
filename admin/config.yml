# ============================================================
# Decap CMS 設定ファイル
# セットアップ後、backend.repo を自分のリポジトリに書き換えてください
# ============================================================

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # ← ここを書き換える（例: alice/vrc-portfolio）
  branch: main

media_folder:  "images/uploads"
public_folder: "/images/uploads"
locale: ja

collections:

  # ============================================================
  # 作品・実績（ここから追加・編集します）
  # ============================================================
  - name: "works_file"
    label: "作品・実績"
    files:
      - name: "works"
        label: "作品一覧を編集"
        file: "content/works.json"
        fields:
          - label: "作品一覧"
            name: "works"
            widget: "list"
            summary: "{{fields.title}} ({{fields.date}})"
            fields:
              - label: "ID（半角英数・ハイフンのみ、変更不可）"
                name: "id"
                widget: "string"
                hint: "例: world-magic-forest-01"
              - label: "タイトル"
                name: "title"
                widget: "string"
              - label: "カテゴリ"
                name: "category"
                widget: "select"
                options:
                  - { label: "🌍 ワールド",  value: "world" }
                  - { label: "🎭 アバター",  value: "avatar" }
                  - { label: "🎉 イベント",  value: "event" }
                  - { label: "💼 案件",      value: "commission" }
                  - { label: "✨ その他",    value: "other" }
              - label: "説明文"
                name: "description"
                widget: "text"
                required: false
              - label: "サムネイル"
                name: "thumbnail"
                widget: "image"
                required: false
              - label: "タグ（複数OK）"
                name: "tags"
                widget: "list"
                required: false
              - label: "制作年月"
                name: "date"
                widget: "string"
                required: false
                hint: "例: 2025-06"
              - label: "クライアント名"
                name: "client"
                widget: "string"
                required: false
              - label: "リンク"
                name: "links"
                widget: "object"
                required: false
                fields:
                  - { label: "VRChatリンク",   name: "vrchat",  widget: "string", required: false }
                  - { label: "BOOTHリンク",    name: "booth",   widget: "string", required: false }
                  - { label: "Twitter/Xリンク", name: "twitter", widget: "string", required: false }
                  - { label: "YouTubeリンク",  name: "youtube", widget: "string", required: false }
              - label: "おすすめ表示（ Featured ）"
                name: "featured"
                widget: "boolean"
                default: false
              - label: "公開する"
                name: "published"
                widget: "boolean"
                default: true

  # ============================================================
  # プロフィール・サイト設定
  # ============================================================
  - name: "settings"
    label: "プロフィール設定"
    files:
      - name: "profile"
        label: "プロフィールを編集"
        file: "content/profile.json"
        fields:
          - label: "表示名"
            name: "name"
            widget: "string"
          - label: "VRChat ユーザー名"
            name: "vrchat_username"
            widget: "string"
          - label: "VRChat ユーザーID（usr_xxxxx）"
            name: "vrchat_user_id"
            widget: "string"
            required: false
          - label: "キャッチコピー"
            name: "tagline"
            widget: "string"
            hint: "例: VRChat Creator | ワールド・アバター制作"
          - label: "自己紹介文"
            name: "bio"
            widget: "text"
          - label: "アバター画像"
            name: "avatar_image"
            widget: "image"
            required: false
          - label: "依頼受付状況"
            name: "commission_status"
            widget: "select"
            options:
              - { label: "受付中 ✅", value: "open" }
              - { label: "停止中 ❌", value: "closed" }
            default: "open"
          - label: "ソーシャルリンク"
            name: "social"
            widget: "object"
            fields:
              - { label: "VRChat",     name: "vrchat",  widget: "string", required: false }
              - { label: "Twitter/X",  name: "twitter", widget: "string", required: false }
              - { label: "BOOTH",      name: "booth",   widget: "string", required: false }
              - { label: "GitHub",     name: "github",  widget: "string", required: false }
              - { label: "Discord",    name: "discord", widget: "string", required: false }
              - { label: "YouTube",    name: "youtube", widget: "string", required: false }
          - label: "統計情報"
            name: "stats"
            widget: "list"
            fields:
              - { label: "ラベル", name: "label",  widget: "string" }
              - { label: "数値",   name: "value",  widget: "string" }
              - { label: "アイコン（絵文字）", name: "icon", widget: "string" }
              - { label: "単位",   name: "suffix", widget: "string", required: false }
          - label: "スキル"
            name: "skills"
            widget: "list"
            required: false
            fields:
              - { label: "スキル名", name: "name",     widget: "string" }
              - { label: "レベル（0〜100）", name: "level", widget: "number", value_type: "int", min: 0, max: 100 }
              - { label: "カテゴリ", name: "category", widget: "string", hint: "例: 3D / ゲームエンジン" }
